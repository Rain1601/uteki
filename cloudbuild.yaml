# Cloud Build pipeline for uteki.
#
# Triggered by Cloud Build Trigger on push to main (trigger configured in the
# GCP console; this file is the build definition only). Builds both images,
# pushes them to Artifact Registry, deploys each to its Cloud Run service with
# --no-traffic so a smoke step can validate the new revision before traffic
# flips to 100%.
#
# Prerequisites (one-time, see DEPLOY.md):
#   • Artifact Registry repo `uteki` in us-central1
#   • Cloud Run services `uteki-api` and `uteki-web` in us-central1
#   • Cloud Build service account has roles/run.admin + iam.serviceAccountUser
#     on the Cloud Run runtime SAs
#
# Substitutions provided automatically by Cloud Build:
#   $PROJECT_ID, $COMMIT_SHA, $SHORT_SHA

steps:
  # ── Build api ────────────────────────────────────────────────────────────
  - id: build-api
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - services/api/Dockerfile
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/uteki/api:$COMMIT_SHA
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/uteki/api:latest
      - .

  # ── Build web ────────────────────────────────────────────────────────────
  # NEXT_PUBLIC_API_BASE is baked into the client bundle at build time, so
  # it must be passed as a docker --build-arg, not a runtime env on the
  # Cloud Run service. The default below points at the Cloud Run-allocated
  # api host for this project; override via substitution if/when a custom
  # domain or LB fronts the api.
  - id: build-web
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/web/Dockerfile
      - --build-arg
      - NEXT_PUBLIC_API_BASE=${_API_BASE_URL}
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/uteki/web:$COMMIT_SHA
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/uteki/web:latest
      - .

  # ── Push api ─────────────────────────────────────────────────────────────
  - id: push-api
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/$PROJECT_ID/uteki/api
    waitFor: [build-api]

  # ── Push web ─────────────────────────────────────────────────────────────
  - id: push-web
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/$PROJECT_ID/uteki/web
    waitFor: [build-web]

  # ── Deploy api (no traffic, tagged revision for smoke) ───────────────────
  - id: deploy-api
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - uteki-api
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/uteki/api:$COMMIT_SHA
      - --region=us-central1
      - --no-traffic
      - --tag=rev-$SHORT_SHA
    waitFor: [push-api]

  # ── Deploy web (no traffic, tagged revision for smoke) ───────────────────
  - id: deploy-web
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - uteki-web
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/uteki/web:$COMMIT_SHA
      - --region=us-central1
      - --no-traffic
      - --tag=rev-$SHORT_SHA
    waitFor: [push-web]

  # ── Smoke test the staged revisions ───────────────────────────────────────
  # scripts/smoke_test.sh probes the tagged ``rev-${SHORT_SHA}`` URL of each
  # service (reachable even at --no-traffic) and exits non-zero on any check
  # failure. The two promote-* steps below are gated on this.
  - id: smoke
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    env:
      - PROJECT_ID=$PROJECT_ID
      - SHORT_SHA=$SHORT_SHA
      - REGION=us-central1
    args:
      - scripts/smoke_test.sh
    waitFor: [deploy-api, deploy-web]

  # ── Flip 100% traffic to the new revisions (gated on green smoke) ─────────
  - id: promote-api
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - update-traffic
      - uteki-api
      - --region=us-central1
      - --to-latest
    waitFor: [smoke]

  - id: promote-web
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - update-traffic
      - uteki-web
      - --region=us-central1
      - --to-latest
    waitFor: [smoke]

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/uteki/api:$COMMIT_SHA
  - us-central1-docker.pkg.dev/$PROJECT_ID/uteki/web:$COMMIT_SHA

substitutions:
  # Default the web bundle to call the project's allocated api hostname.
  # Override via:
  #   gcloud builds submit --substitutions=_API_BASE_URL=https://api.example.com
  # when a custom domain fronts the api.
  _API_BASE_URL: https://uteki-api-723833029845.us-central1.run.app

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s
