<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="uteki raindrop">
  <!-- chiclet — warm dark background, slightly rounded square (path-based) -->
  <path d="M12 4 L52 4 C56 4, 60 8, 60 12 L60 52 C60 56, 56 60, 52 60 L12 60 C8 60, 4 56, 4 52 L4 12 C4 8, 8 4, 12 4 Z"
        fill="#1a1816"/>

  <!-- raindrop body — terracotta teardrop with sharp top point.
       Long vertical handle out of the apex keeps the top narrow so the
       silhouette reads as "raindrop" rather than "egg" even at 16px. -->
  <path d="M32 6 C 32 22, 51 30, 51 41 C 51 52, 43 57, 32 57 C 21 57, 13 52, 13 41 C 13 30, 32 22, 32 6 Z"
        fill="#d97757"/>

  <!-- raindrop outline — confident cream stroke, slightly offset so the
       line reads as drawn (1-2px wobble vs the fill path) -->
  <path d="M32 5 C 33 23, 52 30, 51 42 C 52 53, 43 58, 31 57 C 21 58, 12 53, 13 40 C 14 30, 31 22, 32 5 Z"
        fill="none"
        stroke="rgba(255,255,255,0.92)"
        stroke-width="4"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- inner highlight — single cream curve, hints at ripple / data -->
  <path d="M24 28 C 22 33, 21 38, 24 43"
        fill="none"
        stroke="rgba(255,255,255,0.85)"
        stroke-width="2.8"
        stroke-linecap="round"/>
</svg>
